name: 'Check required vars and secrets'
description: >
  Validates the deployment inputs (host name, core SSH/IP secrets) and ensures every
  ${vars.*} / ${secrets.*} placeholder referenced in the .env template has a value.

inputs:
  target-host:
    description: 'Target host / environment name'
    required: true
  ssh-root-key:
    description: 'Root SSH private key (secrets.SSH_ROOT_KEY)'
    required: true
  ssh-agenix-key:
    description: 'Agenix SSH private key (secrets.SSH_AGENIX_KEY)'
    required: true
  ip-address:
    description: 'Target host IPv4 address (secrets.IP_ADDRESS)'
    required: true
  vars-json:
    description: 'All vars as JSON, i.e. toJSON(vars)'
    required: true
  secrets-json:
    description: 'All secrets as JSON, i.e. toJSON(secrets)'
    required: true
  template:
    description: 'Path to the .env template that declares required vars/secrets'
    required: false
    default: 'deployment/.env.template'

runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        TARGET_HOST: ${{ inputs.target-host }}
        SSH_ROOT_KEY: ${{ inputs.ssh-root-key }}
        SSH_AGENIX_KEY: ${{ inputs.ssh-agenix-key }}
        IP_ADDRESS: ${{ inputs.ip-address }}
        ALL_VARS: ${{ inputs.vars-json }}
        ALL_SECRETS: ${{ inputs.secrets-json }}
        TEMPLATE: ${{ inputs.template }}
      run: |
        set -euo pipefail

        if [[ ! "$TARGET_HOST" =~ ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?$ ]]; then
          echo "ERROR: Environment name '$TARGET_HOST' is invalid. Use 1-63 letters, digits, or hyphens starting/ending with a letter or digit."
          exit 1
        fi
        if [[ -z "$SSH_ROOT_KEY" ]]; then
          echo "ERROR: SSH_ROOT_KEY secret is missing or empty."
          exit 1
        fi
        if [[ -z "$SSH_AGENIX_KEY" ]]; then
          echo "ERROR: SSH_AGENIX_KEY secret is missing or empty."
          exit 1
        fi
        if [[ -z "$IP_ADDRESS" ]]; then
          echo "ERROR: IP_ADDRESS secret is missing or empty."
          exit 1
        fi
        if [[ ! "$IP_ADDRESS" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
          echo "ERROR: IP_ADDRESS must be a valid IPv4 address."
          exit 1
        fi
        IFS=. read -r o1 o2 o3 o4 <<< "$IP_ADDRESS"
        for octet in "$o1" "$o2" "$o3" "$o4"; do
          if (( octet < 0 || octet > 255 )); then
            echo "ERROR: IP_ADDRESS must be a valid IPv4 address."
            exit 1
          fi
        done

        if [[ ! -f "$TEMPLATE" ]]; then
          echo "ERROR: Template '$TEMPLATE' not found."
          exit 1
        fi

        required_vars=$(grep -oE '\$\{vars\.[A-Za-z0-9_]+}' "$TEMPLATE" | sed -E 's/^\$\{vars\.//; s/}$//' | sort -u || true)
        required_secrets=$(grep -oE '\$\{secrets\.[A-Za-z0-9_]+}' "$TEMPLATE" | sed -E 's/^\$\{secrets\.//; s/}$//' | sort -u || true)
        missing=0
        for key in $required_vars; do
          value=$(jq -r --arg k "$key" '.[$k] // empty' <<< "$ALL_VARS")
          if [[ -z "$value" ]]; then
            echo "ERROR: Missing environment variable '$key' referenced in $TEMPLATE."
            missing=1
          fi
        done
        for key in $required_secrets; do
          value=$(jq -r --arg k "$key" '.[$k] // empty' <<< "$ALL_SECRETS")
          if [[ -z "$value" ]]; then
            echo "ERROR: Missing secret '$key' referenced in $TEMPLATE."
            missing=1
          fi
        done
        if [[ "$missing" -ne 0 ]]; then
          exit 1
        fi
        echo "All required vars and secrets are present."